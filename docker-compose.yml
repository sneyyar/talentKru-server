version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: talentkru_postgres
    environment:
      POSTGRES_USER: ${DATABASE_USER:-talentkru}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-talentkru_secret}
      POSTGRES_DB: ${DATABASE_NAME:-talentkru}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-talentkru}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: talentkru_app
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: ["/entrypoint.sh"]

  postgres-test:
    image: pgvector/pgvector:pg16
    container_name: talentkru_postgres_test
    profiles:
      - test
    environment:
      POSTGRES_USER: ${TEST_DATABASE_USER:-talentkru_test}
      POSTGRES_PASSWORD: ${TEST_DATABASE_PASSWORD:-talentkru_test_secret}
      POSTGRES_DB: ${TEST_DATABASE_NAME:-talentkru_test}
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TEST_DATABASE_USER:-talentkru_test}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  postgres_test_data:
